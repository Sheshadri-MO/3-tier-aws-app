- name: Update apt
  apt:
    update_cache: yes

- name: Install Node.js & npm
  apt:
    name:
      - nodejs
      - npm
    state: present

- name: Install PM2
  npm:
    name: pm2
    global: yes

- name: Create app directory
  file:
    path: /home/ubuntu/app
    state: directory

- name: Create app.js (Login App)
  copy:
    dest: /home/ubuntu/app/app.js
    content: |
      const http = require('http');
      const mysql = require('mysql2');
      const querystring = require('querystring');
      const os = require('os');

      const db = mysql.createConnection({
        host: '51.20.81.160',
        user: 'root',
        password: 'root123',
        database: 'testdb'
      });

      db.connect(err => {
        if (err) console.log(err);
        else console.log("Connected to MySQL");
      });

      const server = http.createServer((req, res) => {

        if (req.method === 'GET' && req.url === '/') {
          res.writeHead(200, { 'Content-Type': 'text/html' });
          return res.end(`
            <h2>Login Page (${os.hostname()})</h2>
            <form method="POST" action="/login">
              <input name="username" placeholder="Username"/><br/>
              <input name="password" type="password" placeholder="Password"/><br/>
              <button type="submit">Login</button>
            </form>
          `);
        }

        if (req.method === 'POST' && req.url === '/login') {
          let body = '';

          req.on('data', chunk => body += chunk.toString());

          req.on('end', () => {
            const { username, password } = querystring.parse(body);

            db.query(
              'SELECT * FROM users WHERE username=? AND password=?',
              [username, password],
              (err, results) => {
                if (results.length > 0) {
                  res.end("Login Successful 🚀 from " + os.hostname());
                } else {
                  res.end("Invalid Credentials ❌");
                }
              }
            );
          });

          return;
        }

      });

      server.listen(3000, '0.0.0.0', () => {
        console.log("Server running");
      });

- name: Install MySQL npm package
  command: npm install mysql2
  args:
    chdir: /home/ubuntu/app

- name: Start app with PM2
  shell: |
    pm2 restart all || pm2 start app.js
  args:
    chdir: /home/ubuntu/app

- name: Save PM2 process
  command: pm2 save

- name: Install Node Exporter
  apt:
    name: prometheus-node-exporter
    state: present
    update_cache: yes

- name: Start Node Exporter
  service:
    name: prometheus-node-exporter
    state: started
    enabled: yes