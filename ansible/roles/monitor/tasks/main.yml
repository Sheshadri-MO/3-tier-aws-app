- name: Update apt
  apt:
    update_cache: yes

- name: Install Prometheus
  apt:
    name: prometheus
    state: present

- name: Start Prometheus
  service:
    name: prometheus
    state: started
    enabled: yes

- name: Install required packages
  apt:
    name:
      - apt-transport-https
      - software-properties-common
    state: present
    update_cache: yes

- name: Add Grafana GPG key
  apt_key:
    url: https://packages.grafana.com/gpg.key
    state: present

- name: Add Grafana repository
  apt_repository:
    repo: "deb https://packages.grafana.com/oss/deb stable main"
    state: present

- name: Install Grafana
  apt:
    name: grafana
    state: present
    update_cache: yes

- name: Start Grafana
  service:
    name: grafana-server
    state: started
    enabled: yes