- name: Update apt
  apt:
    update_cache: yes

- name: Install Redis
  apt:
    name: redis-server
    state: present

- name: Bind Redis to all interfaces
  lineinfile:
    path: /etc/redis/redis.conf
    regexp: '^bind'
    line: 'bind 0.0.0.0'

- name: Disable protected mode
  lineinfile:
    path: /etc/redis/redis.conf
    regexp: '^protected-mode'
    line: 'protected-mode no'

- name: Restart Redis
  service:
    name: redis-server
    state: restarted
    enabled: yes

- name: Install Node Exporter
  apt:
    name: prometheus-node-exporter
    state: present
    update_cache: yes

- name: Start Node Exporter
  service:
    name: prometheus-node-exporter
    state: started
    enabled: yes